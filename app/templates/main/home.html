<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Server is running</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
        h1 { color: #333; }
        .features { display: grid; gap: 12px; margin-top: 20px; }
        .feature { padding: 16px; border-radius: 8px; text-decoration: none; }
        .api { background: #e3f2fd; color: #1565c0; }
        .auth { background: #e8f5e9; color: #2e7d32; }
        .docs { background: #fff3e0; color: #ef6c00; }
    </style>
</head>
<body>
    <h1>Server is running</h1>

    <p>Vistas Disponibles:</p>
    
    <div class="features">
        <a href="/examples-yeremi" class="feature auth">Ejemplos Yeremi</a>
        <a href="/examples-german" class="feature api">Ejemplos German</a>
    </div>

    <p>API disponible:</p>
    
    <div class="features">
        <a href="/api/auth/login" class="feature auth">POST /api/auth/login - Login</a>
        <a href="/api/auth/register" class="feature auth">POST /api/auth/register - Register</a>
        <a href="/api/products/" class="feature api">GET /api/products/ - List products</a>
        <a href="/api/users/" class="feature api">GET /api/users/ - List users</a>
        <a href="/examples/" class="feature docs">GET /examples/ - Examples</a>
        <a href="/protected" class="feature docs">GET /protected - Protected route (requires JWT)</a>
    </div>
</body>
</html>
